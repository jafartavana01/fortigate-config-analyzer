config system global
    set hostname "FW-PROD-01"
    set alias "Production Firewall"
    set timezone 04
    set admintimeout 480
    set admin-https-ssl-versions tlsv1-2 tlsv1-3
    set admin-lockout-threshold 5
    set admin-lockout-duration 60
    set gui-certificates enable
    set strong-crypto enable
    set ssh-cbc-cipher disable
    set ssh-hmac-md5 disable
    set two-factor-email-expiry 600
end

config system interface
    edit "wan1"
        set vdom "root"
        set ip 203.0.113.1 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set role wan
        set snmp-index 1
    next
    edit "lan"
        set vdom "root"
        set ip 192.168.1.1 255.255.255.0
        set allowaccess ping https ssh http telnet
        set type physical
        set role lan
        set snmp-index 2
    next
    edit "dmz"
        set vdom "root"
        set ip 172.16.0.1 255.255.255.0
        set allowaccess ping https
        set type physical
        set role dmz
        set snmp-index 3
    next
end

config system dns
    set primary 8.8.8.8
    set secondary 8.8.4.4
end

config system ntp
    set ntpsync enable
    set type custom
    config ntpserver
        edit 1
            set server "pool.ntp.org"
        next
    end
end

config system admin
    edit "admin"
        set accprofile "super_admin"
        set vdom "root"
        set password ENC blahblah
    next
    edit "readonly"
        set accprofile "readonly"
        set vdom "root"
        set password ENC blahblah
        set two-factor email
        set email-to "admin@example.com"
    next
end

config system password-policy
    set status enable
    set minimum-length 8
    set min-lower-case-letter 1
    set min-upper-case-letter 0
    set min-non-alphanumeric 0
    set expire-day 90
end

config system snmp community
    edit 1
        set name "public"
        set status enable
        config hosts
            edit 1
                set ip 192.168.1.100 255.255.255.255
            next
        end
    next
end

config system ha
    set group-name "FW-CLUSTER"
    set mode a-p
    set password ENC blahblah
    set hbdev "ha1" 100 "ha2" 100
    set override disable
end

config router static
    edit 1
        set gateway 203.0.113.254
        set device "wan1"
    next
end

config router ospf
    set router-id 10.0.0.1
    config area
        edit 0.0.0.0
        next
    end
    config network
        edit 1
            set prefix 10.0.0.0 255.255.0.0
        next
    end
end

config firewall address
    edit "ALL"
        set type ipmask
        set subnet 0.0.0.0 0.0.0.0
    next
    edit "LAN_SUBNET"
        set type ipmask
        set subnet 192.168.1.0 255.255.255.0
    next
    edit "DMZ_SERVERS"
        set type ipmask
        set subnet 172.16.0.0 255.255.255.0
    next
    edit "MGMT_HOST"
        set type ipmask
        set subnet 192.168.1.100 255.255.255.255
    next
end

config firewall addrgrp
    edit "INTERNAL_NETS"
        set member "LAN_SUBNET" "DMZ_SERVERS"
    next
end

config firewall service custom
    edit "CUSTOM_APP_8443"
        set protocol TCP
        set tcp-portrange 8443
    next
    edit "MGMT_SSH"
        set protocol TCP
        set tcp-portrange 22
    next
end

config firewall policy
    edit 1
        set name "LAN-to-WAN"
        set srcintf "lan"
        set dstintf "wan1"
        set srcaddr "LAN_SUBNET"
        set dstaddr "ALL"
        set action accept
        set schedule "always"
        set service "ALL"
        set utm-status enable
        set av-profile "default"
        set webfilter-profile "default"
        set ips-sensor "default"
        set application-list "default"
        set logtraffic all
        set nat enable
    next
    edit 2
        set name "DMZ-to-WAN"
        set srcintf "dmz"
        set dstintf "wan1"
        set srcaddr "DMZ_SERVERS"
        set dstaddr "ALL"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic disable
        set nat enable
    next
    edit 3
        set name "WAN-to-DMZ"
        set srcintf "wan1"
        set dstintf "dmz"
        set srcaddr "ALL"
        set dstaddr "DMZ_SERVERS"
        set action accept
        set schedule "always"
        set service "HTTPS" "HTTP"
        set utm-status enable
        set av-profile "default"
        set ips-sensor "strict"
        set logtraffic all
    next
    edit 4
        set name "MGMT-ACCESS"
        set srcintf "lan"
        set dstintf "wan1"
        set srcaddr "ALL"
        set dstaddr "ALL"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic disable
    next
end

config antivirus profile
    edit "default"
        set comment "Default AV profile"
        config http
            set av-scan enable
            set outbreak-prevention disable
        end
        config ftp
            set av-scan enable
        end
        config imap
            set av-scan enable
            set executables virus
        end
        config smtp
            set av-scan enable
        end
    next
    edit "strict"
        set comment "Strict AV"
        config http
            set av-scan enable
            set outbreak-prevention enable
        end
        config ftp
            set av-scan enable
        end
    next
end

config ips sensor
    edit "default"
        set comment "Default IPS sensor"
        config entries
            edit 1
                set rule 1001 1002 1003
                set action block
                set severity medium high critical
            next
        end
    next
    edit "strict"
        set comment "Strict IPS - block all high/critical"
        config entries
            edit 1
                set rule 1001 1002 1003 2001 2002
                set action block
                set severity high critical
            next
            edit 2
                set action default
                set severity low medium
                set status enable
            next
        end
    next
end

config webfilter profile
    edit "default"
        set comment "Default web filter"
        set options https-scan
        config ftgd-wf
            set options error-allow
            config filters
                edit 1
                    set category 26
                    set action block
                next
                edit 2
                    set category 61
                    set action block
                next
            end
        end
    next
end

config application list
    edit "default"
        set comment "Default application control"
        config entries
            edit 1
                set category 2
                set action block
            next
            edit 2
                set application 34186
                set action block
            next
        end
    next
end

config firewall ssl-ssh-profile
    edit "deep-inspection"
        set server-cert-mode replace
        set caname "Fortinet_CA_SSL"
        set ssl-anomalies-log enable
        set ssl-exemptions-log enable
        config https
            set ports 443 8443
            set status deep-inspection
            set unsupported-ssl-version block
            set expired-server-cert block
            set revoked-server-cert block
            set untrusted-server-cert block
            set min-allowed-ssl-version tls-1.2
        end
        config ssh
            set ports 22
            set status deep-inspection
            set inspect-all disable
        end
    next
end

config user local
    edit "svc_backup"
        set type password
        set passwd ENC blahblah
        set email-to "backup@example.com"
    next
    edit "svc_monitor"
        set type password
        set passwd ENC blahblah
        set two-factor email
        set email-to "monitor@example.com"
    next
end

config user group
    edit "VPN_USERS"
        set member "svc_backup" "svc_monitor"
    next
end

config vpn ipsec phase1-interface
    edit "VPN-OFFICE"
        set interface "wan1"
        set ike-version 2
        set keylife 28800
        set peertype any
        set proposal aes256-sha256
        set dhgrp 14 5
        set remote-gw 198.51.100.1
        set psksecret ENC blahblah
        set dpd on-idle
        set dpd-retryinterval 60
    next
end

config vpn ipsec phase2-interface
    edit "VPN-OFFICE-P2"
        set phase1name "VPN-OFFICE"
        set proposal aes256-sha256
        set dhgrp 14
        set keylifeseconds 3600
        set src-subnet 192.168.1.0 255.255.255.0
        set dst-subnet 10.10.0.0 255.255.255.0
    next
end

config log syslog setting
    set status enable
    set server "192.168.1.200"
    set port 514
    set facility local7
    set format default
end

config log setting
    set resolve-ip disable
    set resolve-port enable
    set log-user-in-upper disable
    set fwpolicy-implicit-log enable
    set extended-log enable
end

config system replacemsg-group
end
